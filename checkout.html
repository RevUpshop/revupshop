<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення | RevUp Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&family=Unbounded:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3b30; --dark: #050505; }
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--dark); 
            color: #fff; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Анімований фон */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 59, 48, 0.15) 0%, rgba(5, 5, 5, 0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(80px);
            animation: pulse-bg 8s infinite alternate;
        }

        @keyframes pulse-bg {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
        }

        .unbounded { font-family: 'Unbounded', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: white;
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.1);
        }

        .btn-final {
            background: var(--red);
            color: #fff;
            border-radius: 22px;
            padding: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-final:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 59, 48, 0.4);
        }

        .btn-final::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        .item-row { transition: all 0.3s ease; }
        .item-row:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(10px);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header class="p-8 md:p-12 flex justify-between items-center max-w-[1440px] mx-auto relative z-10">
        <a href="index.html" class="unbounded text-[10px] font-black uppercase tracking-[0.4em] text-white/30 hover:text-red-500 transition-all duration-500">
            ← Повернутись
        </a>
        <div class="unbounded text-2xl font-black italic tracking-tighter">REV<span class="text-red-500">UP</span></div>
    </header>

    <main class="max-w-[1200px] mx-auto px-6 py-10 relative z-10">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            
            <div class="space-y-8">
                <div>
                    <span class="text-red-500 font-bold uppercase tracking-[0.4em] text-[10px] block mb-4">Ваш кошик</span>
                    <h2 class="unbounded text-3xl font-black uppercase leading-none">Підтвердіть<br><span class="text-white/20">Вибір</span></h2>
                </div>

                <div id="checkout-items" class="space-y-4">
                    </div>

                <div class="glass-card p-10 flex justify-between items-center bg-gradient-to-r from-red-500/10 to-transparent">
                    <span class="unbounded text-xs font-black opacity-50 uppercase tracking-widest">Разом до оплати</span>
                    <span id="checkout-total" class="unbounded text-4xl font-black text-white">0₴</span>
                </div>
            </div>

            <div class="glass-card p-8 md:p-12 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-500/10 rounded-full blur-3xl"></div>
                
                <form action="https://api.web3forms.com/submit" method="POST" id="main-form" class="relative z-10">
                    <input type="hidden" name="access_key" value="6fb49301-bc8d-4639-84c1-d5093c667dda">
                    <input type="hidden" name="order_list" id="order_list_input">
                    
                    <div class="space-y-5">
                        <div class="group">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-4 mb-2 block group-focus-within:text-red-500 transition-colors">Отримувач</label>
                            <input type="text" name="name" placeholder="Прізвище, Ім'я та По батькові" required class="input-field font-bold text-sm">
                        </div>

                        <div class="group">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-4 mb-2 block group-focus-within:text-red-500 transition-colors">Контактний номер</label>
                            <input type="tel" name="phone" placeholder="+38 (0__) --- -- --" required class="input-field font-bold text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-5">
                            <div class="group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-4 mb-2 block group-focus-within:text-red-500 transition-colors">Місто</label>
                                <input type="text" name="city" placeholder="Львів" required class="input-field font-bold text-sm">
                            </div>
                            <div class="group">
                                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-4 mb-2 block group-focus-within:text-red-500 transition-colors">НП №</label>
                                <input type="text" name="post" placeholder="Відділення Нової Пошти" required class="input-field font-bold text-sm">
                            </div>
                        </div>

                        <div class="group pt-4">
                            <textarea name="message" placeholder="Додати коментар до замовлення..." rows="2" class="input-field font-bold text-sm resize-none"></textarea>
                        </div>
                        
                        <div class="pt-6">
                            <button type="submit" class="btn-final unbounded text-sm">
                                Оформити замовлення
                            </button>
                            <p class="text-[9px] text-center text-gray-600 mt-6 uppercase tracking-[0.2em] font-black">
                                Натискаючи, ви підтверджуєте замовлення в RevUp Performance
                            </p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-white/5 text-[9px] font-black uppercase tracking-[1em]">
        © 2026 REVUP PERFORMANCE
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('revup_cart')) || [];

        function init() {
            const container = document.getElementById('checkout-items');
            const totalEl = document.getElementById('checkout-total');
            const hiddenInput = document.getElementById('order_list_input');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="glass-card p-20 text-center">
                        <div class="unbounded text-xs opacity-20 uppercase mb-6 tracking-widest">Кошик порожній</div>
                        <a href="index.html" class="text-red-500 font-black uppercase text-[10px] border-b border-red-500/30 pb-1">Повернутись за покупками</a>
                    </div>`;
                return;
            }

            let total = 0;
            let listText = "";

            container.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                listText += `${item.name} (ціна: ${item.price}, к-ть: ${item.qty}, разом: ${itemTotal}грн); `;
                
                return `
                    <div class="item-row flex items-center gap-6 bg-white/5 p-5 rounded-[30px] border border-white/5">
                        <div class="w-16 h-16 rounded-2xl overflow-hidden border border-white/10">
                            <img src="${item.image}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <h4 class="unbounded text-[10px] font-black uppercase text-white tracking-wider">${item.name}</h4>
                            <div class="flex justify-between items-end mt-1">
                                <div>
                                    <p class="text-white/20 font-black text-[9px] uppercase tracking-tighter">Кількість: ${item.qty}</p>
                                    <p class="text-red-500 font-black text-xs">${item.price}₴</p>
                                </div>
                                <p class="text-white font-black text-sm unbounded italic">${itemTotal}₴</p>
                            </div>
                        </div>
                    </div>`;
            }).join('');

            totalEl.innerText = total + '₴';
            hiddenInput.value = listText + " | ВСЬОГО: " + total + "грн";
        }

        document.getElementById('main-form').onsubmit = function() {
            setTimeout(() => { localStorage.removeItem('revup_cart'); }, 1000);
        };

        init();
    </script>
</body>
</html>
